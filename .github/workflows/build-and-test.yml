name: Build and Test (Reusable)❤️

on:
  workflow_call:
    inputs:
      unity_version:
        required: true
        type: string
      platform:
        required: true
        type: string
      debug:
        required: false
        type: boolean
        default: true
      benchmark:
        required: false
        type: boolean
        default: false
      run_tests:
        required: false
        type: boolean
        default: false
      test_timeout:
        required: false
        type: number
        default: 300
      build_runner:
        required: false
        type: string
        default: 'unity-runner'

jobs:
  build:
    runs-on: ${{ inputs.build_runner }}
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          lfs: true
          submodules: recursive

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ inputs.platform }}-${{ inputs.unity_version }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ inputs.platform }}-${{ inputs.unity_version }}-
            Library-${{ inputs.platform }}-

      - name: Cache IL2CPP
        uses: actions/cache@v4
        with:
          path: |
            Library/Il2cppBuildCache
            Library/Bee
          key: IL2CPP-${{ inputs.platform }}-${{ inputs.unity_version }}-${{ hashFiles('Assets/**/*.cs') }}
          restore-keys: |
            IL2CPP-${{ inputs.platform }}-${{ inputs.unity_version }}-

      - name: Cache Build Output
        uses: actions/cache@v4
        with:
          path: build
          key: Build-${{ inputs.platform }}-${{ inputs.unity_version }}-${{ github.sha }}
          restore-keys: |
            Build-${{ inputs.platform }}-${{ inputs.unity_version }}-

      - name: "${{ inputs.platform == 'iOS' && 'Generate Xcode Project (not Xcode build)' || 'Build' }}"
        timeout-minutes: 60
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          IL2CPP_ADDITIONAL_ARGS: --compiler-flags=-j8
        with:
          unityVersion: ${{ inputs.unity_version }}
          targetPlatform: ${{ inputs.platform }}
          allowDirtyBuild: true
          customParameters: -ciDebug ${{ inputs.debug }} -ciBenchmark ${{ inputs.benchmark }} -ciTests ${{ inputs.run_tests }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ inputs.unity_version }}-${{ inputs.platform }}
          path: build
          retention-days: 7

  ipa:
    name: ipa
    if: inputs.platform == 'iOS'
    needs: build
    timeout-minutes: 30
    runs-on: macos-14
    steps:
      - name: Download Xcode Project
        uses: actions/download-artifact@v4
        with:
          name: Build-${{ inputs.unity_version }}-iOS
          path: build

      - name: Checkout ci-workflows
        uses: actions/checkout@v4
        with:
          repository: LightSideKittens/ci-workflows
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: fastlane
          path: ci-workflows

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ci-workflows/fastlane

      - name: Configure Git Credentials
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials

      - name: Cache Xcode Derived Data
        uses: actions/cache@v4
        with:
          path: DerivedData
          key: DerivedData-${{ inputs.unity_version }}-${{ github.sha }}
          restore-keys: |
            DerivedData-${{ inputs.unity_version }}-

      - name: Build Signed IPA
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_IDENTIFIER: ${{ secrets.APP_IDENTIFIER }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          XCODEPROJ=$(find build -name "*.xcodeproj" | head -1)
          [ -z "$XCODEPROJ" ] && { echo "ERROR: No .xcodeproj found"; exit 1; }
          echo "Xcode project: $XCODEPROJ"
          PROJECT_DIR=$(dirname "$XCODEPROJ")
          find "$PROJECT_DIR" -name "*.sh" -exec chmod +x {} \;
          find "$PROJECT_DIR" -name "usymtool*" -exec chmod +x {} \;
          cd ci-workflows/fastlane
          bundle install --quiet
          bundle exec fastlane build_ipa \
            xcode_project:"$GITHUB_WORKSPACE/$XCODEPROJ" \
            output_name:"UniText.ipa" \
            output_dir:"$GITHUB_WORKSPACE" \
            type:adhoc \
            derived_data_path:"$GITHUB_WORKSPACE/DerivedData"
          ls -lh "$GITHUB_WORKSPACE/UniText.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPA-${{ inputs.unity_version }}
          path: UniText.ipa
          retention-days: 7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Upload to Firebase App Distribution
        run: |
          curl -sL https://firebase.tools | bash
          firebase appdistribution:distribute UniText.ipa \
            --app "${{ secrets.FIREBASE_APP_ID }}"

  test:
    name: test
    if: |
      !failure() && !cancelled() &&
      inputs.run_tests && !(inputs.platform == 'StandaloneLinux64' && startsWith(inputs.unity_version, '2021'))
    needs: [build, ipa]
    timeout-minutes: 30
    runs-on: ${{
      inputs.platform == 'StandaloneWindows64' && 'windows-latest' ||
      inputs.platform == 'StandaloneOSX' && 'macos-14' ||
      inputs.platform == 'iOS' && 'macos-14' ||
      'ubuntu-latest'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            .github/actions
            .github/scripts
            Assets/server.js
            Assets/UniText.Test

      - name: Download Build Artifact
        if: inputs.platform != 'iOS'
        uses: actions/download-artifact@v4
        with:
          name: Build-${{ inputs.unity_version }}-${{ inputs.platform }}
          path: build

      - name: Download IPA
        if: inputs.platform == 'iOS'
        uses: actions/download-artifact@v4
        with:
          name: IPA-${{ inputs.unity_version }}
          path: .

      - name: Authenticate to Google Cloud (Android/iOS)
        if: inputs.platform == 'Android' || inputs.platform == 'iOS'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Setup Google Cloud SDK (Android/iOS)
        if: inputs.platform == 'Android' || inputs.platform == 'iOS'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Install gcloud beta (iOS)
        if: inputs.platform == 'iOS'
        run: gcloud components install beta --quiet

      - name: Run Tests
        uses: ./.github/actions/run-app
        env:
          FIREBASE_RESULTS_BUCKET: ${{ secrets.FIREBASE_RESULTS_BUCKET }}
        with:
          platform: ${{ inputs.platform }}
          mode: test
          unity_version: ${{ inputs.unity_version }}
          timeout: ${{ inputs.test_timeout }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-${{ inputs.unity_version }}-${{ inputs.platform }}
          path: |
            testResults.xml
            test.log
            xcodebuild.log
            screenshots/
          retention-days: 7

  benchmark:
    if: |
      !failure() && !cancelled() &&
      inputs.benchmark && inputs.platform != 'StandaloneLinux64'
    needs: [build, ipa]
    timeout-minutes: 30
    runs-on: ${{
      inputs.platform == 'StandaloneWindows64' && 'windows-latest' ||
      inputs.platform == 'StandaloneOSX' && 'macos-14' ||
      inputs.platform == 'iOS' && 'macos-14' ||
      'ubuntu-latest'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          sparse-checkout: |
            .github/actions
            .github/scripts
            Assets/server.js

      - name: Download Build Artifact
        if: inputs.platform != 'iOS'
        uses: actions/download-artifact@v4
        with:
          name: Build-${{ inputs.unity_version }}-${{ inputs.platform }}
          path: build

      - name: Download IPA
        if: inputs.platform == 'iOS'
        uses: actions/download-artifact@v4
        with:
          name: IPA-${{ inputs.unity_version }}
          path: .

      - name: Authenticate to Google Cloud (Android/iOS)
        if: inputs.platform == 'Android' || inputs.platform == 'iOS'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

      - name: Setup Google Cloud SDK (Android/iOS)
        if: inputs.platform == 'Android' || inputs.platform == 'iOS'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Install gcloud beta (iOS)
        if: inputs.platform == 'iOS'
        run: gcloud components install beta --quiet

      - name: Run Benchmarks
        uses: ./.github/actions/run-app
        env:
          FIREBASE_RESULTS_BUCKET: ${{ secrets.FIREBASE_RESULTS_BUCKET }}
        with:
          platform: ${{ inputs.platform }}
          mode: benchmark
          unity_version: ${{ inputs.unity_version }}
          timeout: ${{ inputs.test_timeout }}

      - name: Upload Benchmark Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BenchmarkResults-${{ inputs.unity_version }}-${{ inputs.platform }}
          path: |
            benchmarkResults*.json
            benchmark.log
          retention-days: 30

      - name: Benchmark Summary
        if: always()
        shell: bash
        run: |
          if [ -f benchmarkResults.json ]; then
            python3 .github/scripts/benchmark-summary.py \
              benchmarkResults.json \
              --commit "${{ github.sha }}" \
              --branch "${{ github.ref_name }}" \
              >> $GITHUB_STEP_SUMMARY
          else
            echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No benchmark results found." >> $GITHUB_STEP_SUMMARY
          fi
